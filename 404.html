<style id="hero-hologram-v9">
/* ==========================================================
   HERO IMAGE V9 - Holograma Erick Islas Tech
   Cambia solo la ruta del IMG en cada HTML:
   src="../assets/images/especiales/hero-servicios.png"
   ========================================================== */
.hero-image-panel{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  height:100%;
  min-height:clamp(250px, 32vw, 440px);
  overflow:hidden;
  border-radius:32px;
  isolation:isolate;
  perspective:1200px;
}

.hero-image-panel::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:0;
  border-radius:inherit;
  background:
    radial-gradient(circle at 50% 50%, rgba(57,255,20,.20), transparent 34%),
    linear-gradient(rgba(57,255,20,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,20,.045) 1px, transparent 1px);
  background-size:auto, 32px 32px, 32px 32px;
  opacity:.55;
  animation:eitHeroGridDrift 12s linear infinite;
  pointer-events:none;
}

.hero-image-panel::after{
  content:"";
  position:absolute;
  inset:-35%;
  z-index:2;
  background:
    linear-gradient(115deg,
      transparent 0 42%,
      rgba(255,255,255,.10) 47%,
      rgba(57,255,20,.42) 50%,
      rgba(255,255,255,.12) 53%,
      transparent 58% 100%);
  transform:translateX(-72%) rotate(10deg);
  opacity:.0;
  animation:eitHeroScanBeam 5.8s ease-in-out infinite;
  pointer-events:none;
  mix-blend-mode:screen;
}

.hero-services-image{
  position:relative;
  z-index:1;
  width:100%;
  height:100%;
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  object-position:center;
  transform:translateZ(0) scale(.96);
  filter:
    drop-shadow(0 0 18px rgba(57,255,20,.40))
    drop-shadow(0 0 48px rgba(57,255,20,.18));
  animation:
    eitHeroMaterialize .9s ease both,
    eitHeroFloatV9 5.4s ease-in-out infinite,
    eitHeroPulseV9 3.8s ease-in-out infinite;
  transition:
    transform .65s cubic-bezier(.16,1,.3,1),
    filter .65s ease;
  will-change:transform, filter;
}

.hero-image-panel:hover .hero-services-image{
  transform:translateZ(42px) scale(1.045) rotateX(2deg) rotateY(-3deg);
  filter:
    drop-shadow(0 0 26px rgba(57,255,20,.70))
    drop-shadow(0 0 72px rgba(57,255,20,.32))
    saturate(1.14)
    contrast(1.06);
}

.hero-image-panel .hero-services-image::selection{
  background:transparent;
}

.hero-image-panel:hover::before{
  opacity:.8;
}

@keyframes eitHeroMaterialize{
  from{
    opacity:0;
    transform:translateY(18px) scale(.90);
    filter:blur(6px) drop-shadow(0 0 0 rgba(57,255,20,0));
  }
  to{
    opacity:1;
    transform:translateY(0) scale(.96);
  }
}

@keyframes eitHeroFloatV9{
  0%,100%{ translate:0 0; }
  50%{ translate:0 -12px; }
}

@keyframes eitHeroPulseV9{
  0%,100%{ opacity:.96; }
  50%{ opacity:1; }
}

@keyframes eitHeroGridDrift{
  to{ background-position:0 0, 0 320px, 320px 0; }
}

@keyframes eitHeroScanBeam{
  0%,58%{ opacity:0; transform:translateX(-75%) rotate(10deg); }
  66%{ opacity:.85; }
  78%,100%{ opacity:0; transform:translateX(75%) rotate(10deg); }
}

/* Pequeñas partículas holográficas sin elementos extra */
.services-hud.hero-image-panel{
  box-shadow:
    0 0 40px rgba(57,255,20,.13),
    inset 0 0 36px rgba(57,255,20,.07);
}

@media (max-width: 700px){
  .hero-image-panel{
    min-height:260px;
  }
  .hero-services-image{
    transform:scale(.98);
  }
}
